<header class="site-header" [class.site-header--scrolled]="isScrolled">
  <div class="site-header__inner">
    <a class="site-header__logo" routerLink="/" aria-label="Go to homepage">
      <span class="site-header__logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path
            d="M18.83 4.5c-4.68.17-8.29 1.92-10.71 5.18-2.1 2.84-2.98 6.11-3.33 8.32a.77.77 0 0 0 1.22.73c1.44-1.04 3.61-2.27 6.07-3.07 3.6-1.16 6.13-3.45 7.34-6.62.5-1.33.76-2.71.75-4.14a.77.77 0 0 0-.79-.4c-.18 0-.37 0-.55 0Zm-8.49 12.31a.75.75 0 0 1-.46-1.34c2.34-1.84 4.61-4.02 6.35-6.52a.75.75 0 1 1 1.23.85 30.6 30.6 0 0 1-6.66 6.84.74.74 0 0 1-.46.17Z"
          />
        </svg>
      </span>
      <span class="site-header__logo-text">Ayur<em>Veda</em> Daily</span>
    </a>

    <button
      #menuToggleButton
      type="button"
      class="site-header__menu-toggle"
      [class.site-header__menu-toggle--open]="isMenuOpen"
      [attr.aria-expanded]="isMenuOpen"
      [attr.aria-controls]="navigationId"
      [attr.aria-label]="isMenuOpen ? 'Close navigation menu' : 'Open navigation menu'"
      (click)="toggleMenu()"
    >
      <span class="site-header__menu-line"></span>
      <span class="site-header__menu-line"></span>
      <span class="site-header__menu-line"></span>
    </button>

    <div
      class="site-header__panel"
      [class.site-header__panel--open]="isMenuOpen"
      [id]="navigationId"
    >
      <nav class="site-header__nav" aria-label="Primary navigation">
        <ul class="site-header__nav-list">
          <li class="site-header__nav-item" *ngFor="let item of navItems">
            <a
              #menuLink
              class="site-header__nav-link"
              [routerLink]="item.path"
              routerLinkActive="site-header__nav-link--active"
              [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
              (click)="onMenuItemClick()"
            >
              {{ item.label }}
            </a>
          </li>
        </ul>
      </nav>

      <div class="site-header__user">
        <a
          class="site-header__user-link"
          routerLink="/login"
          routerLinkActive="site-header__user-link--active"
          (click)="onMenuItemClick()"
        >
          <span class="site-header__user-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path
                d="M12 12a4.13 4.13 0 1 0-4.13-4.12A4.13 4.13 0 0 0 12 12Zm0 2.06c-4.14 0-7.5 2.28-7.5 5.09a.75.75 0 0 0 .75.75h13.5a.75.75 0 0 0 .75-.75c0-2.81-3.36-5.09-7.5-5.09Z"
              />
            </svg>
          </span>
          <span>Login</span>
        </a>
      </div>
    </div>
  </div>
</header>
