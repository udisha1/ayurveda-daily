<section
  class="newsletter-card"
  [class.newsletter-card--dark]="theme === 'dark'"
  [attr.aria-labelledby]="titleId"
>
  <div class="newsletter-card__header">
    <div class="newsletter-card__icon-wrap" aria-hidden="true">
      <svg class="newsletter-card__icon" viewBox="0 0 24 24" focusable="false">
        <path
          d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2 .38v.14l6.58 4.94a.75.75 0 0 0 .84 0L19 7.27v-.14c0-.62-.5-1.13-1.13-1.13H6.13C5.5 6 5 6.51 5 7.13Zm14 1.89-5.68 4.26a2.25 2.25 0 0 1-2.64 0L5 9.02v8.23c0 .62.5 1.13 1.13 1.13h11.74c.63 0 1.13-.51 1.13-1.13V9.02Z"
        ></path>
      </svg>
    </div>

    <div>
      <h2 class="newsletter-card__title" [id]="titleId">{{ title }}</h2>
      <p class="newsletter-card__description">{{ description }}</p>
    </div>
  </div>

  <form
    class="newsletter-form"
    (ngSubmit)="onSubmit()"
    novalidate
    aria-label="Newsletter subscription form"
  >
    <label class="newsletter-form__label" [for]="emailInputId">Email address</label>

    <div class="newsletter-form__controls">
      <div class="newsletter-form__input-wrap">
        <input
          class="newsletter-form__input"
          [class.newsletter-form__input--error]="emailError"
          [id]="emailInputId"
          type="email"
          name="email"
          [(ngModel)]="email"
          [placeholder]="placeholder"
          [attr.aria-invalid]="emailError ? 'true' : 'false'"
          [attr.aria-describedby]="describedBy"
          autocomplete="email"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
          inputmode="email"
          [disabled]="isSubmitting"
          (input)="onEmailInput()"
        />
        <span class="newsletter-form__input-icon" aria-hidden="true">@</span>
      </div>

      <button
        type="submit"
        class="newsletter-form__button"
        [disabled]="isSubmitting"
        [attr.aria-label]="isSubmitting ? 'Submitting subscription' : 'Subscribe to newsletter'"
        [attr.aria-busy]="isSubmitting"
      >
        <ng-container *ngIf="isSubmitting; else idleButton">
          <span class="newsletter-form__spinner" aria-hidden="true"></span>
          <span>Submitting...</span>
        </ng-container>

        <ng-template #idleButton>{{ buttonLabel }}</ng-template>
      </button>
    </div>

    <p
      *ngIf="emailError"
      class="newsletter-form__message newsletter-form__message--error"
      [id]="emailErrorId"
    >
      {{ emailError }}
    </p>

    <p
      *ngIf="feedbackMessage"
      class="newsletter-form__message"
      [class.newsletter-form__message--success]="feedbackType === 'success'"
      [class.newsletter-form__message--error]="feedbackType === 'error'"
      [id]="feedbackId"
      [attr.role]="feedbackType === 'error' ? 'alert' : 'status'"
    >
      {{ feedbackMessage }}
    </p>
  </form>
</section>
